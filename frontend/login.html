<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - Theirvoices</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Oswald:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --sage: #B9E08E;
      --cream: #F6F3EA;
      --coral: #D13B3B;
      --dark: #111111;
      --graytext: #3F3F3F;
      --white: #FFFFFF;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--sage);
      color: var(--dark);
      line-height: 1.6;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -0.02em;
    }

    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .auth-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      max-width: 1000px;
      width: 100%;
      background: var(--white);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.1);
    }

    .auth-visual {
      background: var(--dark);
      padding: 4rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      color: var(--cream);
      position: relative;
      overflow: hidden;
    }

    .auth-visual::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 10px,
        rgba(185, 224, 142, 0.1) 10px,
        rgba(185, 224, 142, 0.1) 20px
      );
      animation: slide 20s linear infinite;
    }

    @keyframes slide {
      0% { transform: translate(0, 0); }
      100% { transform: translate(50px, 50px); }
    }

    .auth-visual-content {
      position: relative;
      z-index: 1;
    }

    .auth-visual h2 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      color: var(--sage);
    }

    .auth-visual p {
      opacity: 0.8;
      line-height: 1.6;
    }

    .auth-form {
      padding: 4rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .auth-form h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .auth-form > p {
      color: var(--graytext);
      margin-bottom: 2rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 500;
      font-size: 0.875rem;
      margin-bottom: 0.5rem;
    }

    .form-group input {
      width: 100%;
      padding: 0.875rem 1rem;
      border: 1px solid rgba(17, 17, 17, 0.1);
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9375rem;
      background: var(--cream);
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--coral);
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.875rem 1.5rem;
      background: var(--coral);
      color: white;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 0.875rem;
      border-radius: 6px;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      border: none;
      cursor: pointer;
      width: 100%;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(209, 59, 59, 0.3);
    }

    .auth-switch {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.9rem;
      color: var(--graytext);
    }

    .auth-switch a {
      color: var(--coral);
      text-decoration: none;
      font-weight: 600;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 2rem 0;
      color: var(--graytext);
      font-size: 0.875rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(0,0,0,0.1);
    }

    .social-login {
      display: flex;
      gap: 1rem;
    }

    .social-btn {
      flex: 1;
      padding: 0.75rem;
      border: 1px solid rgba(0,0,0,0.1);
      background: var(--white);
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 500;
    }

    .social-btn:hover {
      background: var(--cream);
    }

    .back-link {
      position: absolute;
      top: 2rem;
      left: 2rem;
      color: var(--dark);
      text-decoration: none;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    @media (max-width: 768px) {
      .auth-container {
        grid-template-columns: 1fr;
      }
      .auth-visual {
        display: none;
      }
    }
  </style>
</head>
<body>
  <a href="index.html" class="back-link">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="19" y1="12" x2="5" y2="12"></line>
      <polyline points="12 19 5 12 12 5"></polyline>
    </svg>
    Back to home
  </a>

  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-visual">
        <div class="auth-visual-content">
          <h2>Welcome back</h2>
          <p>Continue your creative journey. Join thousands of African women making music and building careers.</p>
        </div>
      </div>
      <div class="auth-form">
        <h1>Sign In</h1>
        <p>Enter your credentials to access your account</p>
        
        <form onsubmit="handleLogin(event)">
          <div class="form-group">
            <label for="email">Email or Phone</label>
            <input type="text" id="email" name="email" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn-primary">
            Sign In
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </button>
        </form>

        <div class="divider">or continue with</div>

        <div class="social-login">
          <button class="social-btn">Google</button>
          <button class="social-btn">Phone OTP</button>
        </div>

        <div class="auth-switch">
          Don't have an account? <a href="register.html">Create one</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      // Simulate login - redirect to dashboard
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
