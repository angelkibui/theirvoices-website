  <link rel="stylesheet" href="css/app.css">
</head>
<body>

  <!-- Navigation -->

    <a href="dashboard.html" class="logo">Theirvoices</a>
    <div class="nav-links">
      <a href="profile.html" id="userName">User</a>
      <a href="#" onclick="logout()" class="btn-primary">Logout</a>
    </div>
  </nav>

  <!-- Dashboard -->
  <div class="dashboard">
    <!-- Sidebar -->
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <a href="dashboard.html">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"></rect>
            <rect x="14" y="3" width="7" height="7"></rect>
            <rect x="14" y="14" width="7" height="7"></rect>
            <rect x="3" y="14" width="7" height="7"></rect>
          </svg>
          Dashboard
        </a>
        <a href="courses.html">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
          </svg>
          Courses
        </a>
        <a href="studio.html">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 18V5l12-2v13"></path>
            <circle cx="6" cy="18" r="3"></circle>
            <circle cx="18" cy="16" r="3"></circle>
          </svg>
          Studio
        </a>
        <a href="marketplace.html" class="active">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
          </svg>
          Marketplace
        </a>
        <a href="community.html">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
          </svg>
          Community
        </a>
        <a href="profile.html">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          Profile
        </a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="page-header">
        <h1>Marketplace</h1>
        <p>Discover beats, samples, and tracks from creators</p>
      </div>

      <!-- Filters -->
      <div class="marketplace-filters">
        <select id="categoryFilter" onchange="filterProducts()">
          <option value="all">All Categories</option>
          <option value="Beats">Beats</option>
          <option value="Samples">Samples</option>
          <option value="Loops">Loops</option>
        </select>
        
        <select id="priceFilter" onchange="filterProducts()">
          <option value="all">All Prices</option>
          <option value="0-20">Under $20</option>
          <option value="20-30">$20 - $30</option>
          <option value="30+">$30+</option>
        </select>
      </div>

      <!-- Products Grid -->
      <div class="content-grid" id="productsGrid">
        <!-- Products will be loaded here -->
      </div>
    </main>
  </div>

  <script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
  // Protect this page
  protectPage();

  // Get current user
  const user = getCurrentUser();
  if (user) {
    document.getElementById('userName').textContent = getFirstName(user.name);
  }

  // Product icons (SVG)
  const productIcons = {
    'Samples': '<svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"></circle><polygon points="10 8 16 12 10 16 10 8"></polygon></svg>',
    'Loops': '<svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg>',
    'Beats': '<svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>'
  };

  // Load products
  function loadProducts(filter = { category: 'all', price: 'all' }) {
    const productsStr = localStorage.getItem(CONFIG.MARKETPLACE_KEY);
    let products = productsStr ? JSON.parse(productsStr) : SAMPLE_MARKETPLACE;
    
    // Filter by category
    if (filter.category !== 'all') {
      products = products.filter(p => p.category === filter.category);
    }
    
    // Filter by price
    if (filter.price !== 'all') {
      if (filter.price === '0-20') {
        products = products.filter(p => p.price < 20);
      } else if (filter.price === '20-30') {
        products = products.filter(p => p.price >= 20 && p.price <= 30);
      } else if (filter.price === '30+') {
        products = products.filter(p => p.price > 30);
      }
    }
    
    const productsGrid = document.getElementById('productsGrid');
    productsGrid.innerHTML = '';
    
    products.forEach(product => {
      const productCard = document.createElement('div');
      productCard.className = 'content-card';
      productCard.onclick = () => purchaseProduct(product);
      
      productCard.innerHTML = `
        <div class="content-card-image">${productIcons[product.category] || productIcons['Samples']}</div>
        <div class="content-card-body">
          <div class="content-card-title">${product.title}</div>
          <div class="content-card-description">${product.description}</div>
          <div class="content-card-meta">
            <span class="badge">${product.category}</span>
            <span style="color: var(--graytext); font-size: 0.875rem;">by ${product.seller}</span>
          </div>
          <div class="product-price">$${product.price}</div>
        </div>
      `;
      
      productsGrid.appendChild(productCard);
    });
  }

  // Filter products
  function filterProducts() {
    const category = document.getElementById('categoryFilter').value;
    const price = document.getElementById('priceFilter').value;
    
    loadProducts({ category, price });
  }

  // Purchase product
  function purchaseProduct(product) {
    const confirmPurchase = confirm(`Purchase "${product.title}" for $${product.price}?`);
    
    if (confirmPurchase) {
      alert('Purchase successful! (Demo mode)\n\nIn the full version, this would process payment via M-Pesa/Mobile Money and download the product.');
    }
  }

  // Load products on page load
  loadProducts();
</script>
</body>
</html>
