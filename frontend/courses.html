    <!-- Main Content -->
    <main class="main-content">
      <div class="page-header">
        <h1>Music Production Courses</h1>
        <p>Learn from beginner to advanced levels</p>
      </div>

      <!-- Courses Grid -->
      <div class="content-grid" id="coursesGrid">
        <!-- Courses will be loaded here -->
      </div>
    </main>
  </div>

  <script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
  // Protect this page
  protectPage();

  // Get current user
  const user = getCurrentUser();
  if (user) {
    document.getElementById('userName').textContent = getFirstName(user.name);
  }

  // Course icons (SVG)
  const courseIcons = {
    '1': '<svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>',
    '2': '<svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect><rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect><line x1="6" y1="6" x2="6.01" y2="6"></line><line x1="6" y1="18" x2="6.01" y2="18"></line></svg>',
    '3': '<svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>',
    '4': '<svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>',
    '5': '<svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"></circle><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H6"></path><path d="M12 18V6"></path></svg>',
    '6': '<svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>'
  };

  // Load courses
  function loadCourses() {
    const coursesStr = localStorage.getItem(CONFIG.COURSES_KEY);
    const courses = coursesStr ? JSON.parse(coursesStr) : SAMPLE_COURSES;
    
    const coursesGrid = document.getElementById('coursesGrid');
    coursesGrid.innerHTML = '';
    
    courses.forEach(course => {
      const courseCard = document.createElement('div');
      courseCard.className = 'content-card';
      courseCard.onclick = () => enrollCourse(course.id);
      
      courseCard.innerHTML = `
        <div class="content-card-image">${courseIcons[course.id] || courseIcons['1']}</div>
        <div class="content-card-body">
          <div class="content-card-title">${course.title}</div>
          <div class="content-card-description">${course.description}</div>
          <div class="content-card-meta">
            <span class="badge">${course.difficulty}</span>
            <span class="badge">${course.duration}</span>
          </div>
          <div style="margin-top: 1rem; font-size: 0.875rem; color: var(--graytext);">
            ${course.enrolled} students enrolled
          </div>
        </div>
      `;
      
      coursesGrid.appendChild(courseCard);
    });
  }

  // Enroll in course
  function enrollCourse(courseId) {
    const user = getCurrentUser();
    const coursesEnrolled = (user.coursesEnrolled || 0) + 1;
    
    updateCurrentUser({ coursesEnrolled });
    
    alert('Successfully enrolled! Start learning now.');
    window.location.href = 'course-detail.html?id=' + courseId;
  }

  // Load courses on page load
  loadCourses();
</script>
</body>
</html>
