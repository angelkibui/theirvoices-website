  <!-- Dashboard -->
  <div class="dashboard">
    <!-- Sidebar -->
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <a href="dashboard.html">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

            <rect x="14" y="3" width="7" height="7"></rect>

          </svg>
          Dashboard
        </a>
        <a href="courses.html" class="active">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
          </svg>
          Courses
        </a>
        <a href="studio.html">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 18V5l12-2v13"></path>
            <circle cx="6" cy="18" r="3"></circle>
            <circle cx="18" cy="16" r="3"></circle>
          </svg>
          Studio
        </a>
        <a href="marketplace.html">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
          </svg>
          Marketplace
        </a>
        <a href="community.html">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>

            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          Profile
        </a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="page-header">
        <h1>Music Production Courses</h1>
        <p>Learn from beginner to advanced levels</p>
      </div>

      <!-- Courses Grid -->
      <div class="content-grid" id="coursesGrid">
        <!-- Courses will be loaded here -->
      </div>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Protect this page
    protectPage();

    // Get current user
    const user = getCurrentUser();
    if (user) {
      document.getElementById('userName').textContent = getFirstName(user.name);
    }

    // Load courses
    function loadCourses() {
      const coursesStr = localStorage.getItem(CONFIG.COURSES_KEY);
      const courses = coursesStr ? JSON.parse(coursesStr) : SAMPLE_COURSES;
      
      const coursesGrid = document.getElementById('coursesGrid');
      coursesGrid.innerHTML = '';
      
      courses.forEach(course => {
        const courseCard = document.createElement('div');
        courseCard.className = 'content-card';
        courseCard.onclick = () => enrollCourse(course.id);
        
        courseCard.innerHTML = `
          <div class="content-card-image">${course.icon}</div>
          <div class="content-card-body">
            <div class="content-card-title">${course.title}</div>
            <div class="content-card-description">${course.description}</div>
            <div class="content-card-meta">
              <span class="badge">${course.difficulty}</span>
              <span class="badge">${course.duration}</span>
            </div>
            <div style="margin-top: 1rem; font-size: 0.875rem; color: var(--graytext);">
              ${course.enrolled} students enrolled
            </div>
          </div>
        `;
        
        coursesGrid.appendChild(courseCard);
      });
    }

    // Enroll in course
    function enrollCourse(courseId) {
      const user = getCurrentUser();
      const coursesEnrolled = (user.coursesEnrolled || 0) + 1;
      
      updateCurrentUser({ coursesEnrolled });
      
      alert('Successfully enrolled! Start learning now.');
      window.location.href = 'course-detail.html?id=' + courseId;
    }

    // Load courses on page load
    loadCourses();
  </script>
</body>
</html>
